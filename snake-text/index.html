      <div class="post-body">
          <p>把鼠标移入下方区域并快速移动，文字会像蛇一样变成曲线扭动！</p>

<div id="snake-container" style="width: 100%; height: 500px; border: 1px solid #ddd; background: #1a1a1a; position: relative; overflow: hidden; cursor: crosshair;">
    <canvas id="snakeCanvas"></canvas>
</div>

<script>
const container = document.getElementById('snake-container');
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');

// 让画布大小等于容器大小
canvas.width = container.clientWidth;
canvas.height = 500;

// 你想要展示的一串字符
const text = "HELLO·HEXO·NEXT·BLOG·CREATIVE·ANIMATION···";
const textArray = text.split("");

// 鼠标位置历史记录（贪吃蛇的身体路径）
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
let dots = [];
const spacing = 15; // 字母之间的间距

// 初始化蛇的初始身体
for (let i = 0; i < textArray.length * spacing; i++) {
    dots.push({ x: mouse.x, y: mouse.y });
}

// 监听鼠标在容器内的移动
container.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

// 核心动画循环
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 头部跟随鼠标
    let head = dots[0];
    head.x += (mouse.x - head.x) * 0.15; // 缓动系数，越大跟随越紧，越小越飘逸
    head.y += (mouse.y - head.y) * 0.15;
    
    // 身体的每一个点跟随前一个点，形成蛇形曲线
    for (let i = dots.length - 1; i > 0; i--) {
        let current = dots[i];
        let next = dots[i - 1];
        current.x += (next.x - current.x) * 0.6;
        current.y += (next.y - current.y) * 0.6;
    }
    
    // 绘制文字
    ctx.fillStyle = '#00ffcc'; // 霓虹绿字体颜色，可自由修改
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    textArray.forEach((char, index) => {
        // 根据间距算出每个字母应该在路径的哪一个位置
        let dotIndex = index * spacing;
        if (dotIndex < dots.length) {
            let p = dots[dotIndex];
            
            // 计算旋转角度，让字母面朝前进的方向
            let nextP = dots[Math.max(0, dotIndex - 1)];
            let angle = Math.atan2(nextP.y - p.y, nextP.x - p.x);
            
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(angle); // 沿曲线方向旋转字符
            ctx.fillText(char, 0, 0);
            ctx.restore();
        }
    });
    
    requestAnimationFrame(animate);
}

// 启动动画
animate();

// 窗口大小改变时重置画布
window.addEventListener('resize', () => {
    canvas.width = container.clientWidth;
});
</script>
